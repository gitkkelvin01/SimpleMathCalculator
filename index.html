<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Math Calculator</title>
    <link rel="icon" type="image/png" sizes="32x32" href="calculadora.png" />
    <link rel="stylesheet" href="calculator.css" />
  </head>
  <body>
    <div id="calculator">
      <input
        type="text"
        id="display"
        disabled
        placeholder="Math Calculator ✅"
      />

      <div id="keys">
        <button
          onclick="clearDisplay()"
          class="delete-btn"
          style="grid-column: span 3"
        >
          Delete ↻
        </button>
        <button onclick="appendToDisplay('/')" class="operator-btn">/</button>

        <!-- Botões de números e operações com class operator -->
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('*')" class="operator-btn">*</button>

        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('-')" class="operator-btn">-</button>

        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('+')" class="operator-btn">+</button>

        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>

        <!-- Botões de equals ( igual à... ), space "espaço" e undo "desfazer"-->
        <button
          onclick="calculate()"
          class="equal-btn"
          style="grid-column: span 2"
        >
          =
        </button>
        <button
          onclick="appendToDisplay(' ')"
          class="Space-btn"
          style="grid-column: span 2"
        >
          Space
        </button>
        <button onclick="undo()" class="undo-btn" style="grid-column: span 2">
          Undo
        </button>
      </div>
    </div>
    <script src="math.js"></script>
  </body>
</html>
